<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./hh.css">
    <title>Document</title>
</head>
<body>
    <div class="card">
        <div class="btn1"></div>
        <div class="btn2"></div>
        <div class="btn3"></div>
        <div class="btn4"></div>
        <div class="card-int">
            <div class="container">
                <h1>Weather App</h1>
                <form class="search-box" id="search-box">
                    <input type="text" name="location" placeholder="Search..." id="location-input">
                    <button type="submit" aria-label="Search">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                            <path fill="currentColor" d="m19.6 21l-6.3-6.3q-.75.6-1.725.95T9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l6.3 6.3zM9.5 14q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14"/>
                        </svg>
                    </button>
                </form>
                <p class="errTxt" id="errTxt"></p>
                <div class="weather-details" id="weather-details">
                    <h2>Weather In <span id="location">Location Name</span></h2>
                    <div class="grid">
                        <div class="temperature">
                            <span id="weather-condition-icon" style="font-size:80px;line-height:1;display:block;text-align:center;">☀️</span>
                            <p class="temperatureTxt">
                                <span id="temperature">0</span>°C
                            </p>
                            <p id="weather-condition-name">Clear</p>
                        </div>
                        <ul class="info">
                            <li>
                                <span id="humidity-icon" style="font-size:36px;">💧</span>
                                <span id="humidity">0</span>%
                            </li>
                            <li>
                                <span id="wind-icon" style="font-size:36px;">💨</span>
                                <span id="wind-speed">0</span> km/h
                            </li>
                        </ul>
                    </div>
                    <h2>Daily Forecast</h2>
                    <div class="daily-cards" id="daily-forecast"></div>
                </div>
            </div>
            <div class="hello">
                <span class="hidden">Hi!</span>
            </div>
        </div>
        <div class="top">
            <div class="camera">
                <div class="int"></div>
            </div>
            <div class="speaker"></div>
        </div>
    </div>
    <script src="h.js"></script>
</body>
</html>
